<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
  let selectedInterestIndex = -1;

  function loadInterestList() {
    const list = document.getElementById('interest-list');
    const interests = getInterests();
    list.innerHTML = '';
    if (interests.length === 0) {
      list.innerHTML = '<div class="list-group-item text-muted">등록된 관심지역이 없습니다.</div>';
      return;
    }
    interests.forEach(function(item, idx) {
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'list-group-item list-group-item-action d-flex justify-content-between align-items-center';
      el.textContent = item.sido + ' ' + item.gugun + ' ' + item.dong;
      el.dataset.idx = idx;
      el.addEventListener('click', function() {
        document.querySelectorAll('#interest-list .list-group-item').forEach(function(e) {
          e.classList.remove('active');
        });
        el.classList.add('active');
        selectedInterestIndex = idx;
      });
      list.appendChild(el);
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    if (!requireLogin()) return;
    loadRegionData().then(() => populateSido('sido'));
    loadInterestList();

    document.getElementById('sido').addEventListener('change', function() {
      populateGugun(this.value, 'gugun');
      document.getElementById('dong').innerHTML = '<option value="">읍/면/동 선택</option>';
    });

    document.getElementById('gugun').addEventListener('change', function() {
      const sido = document.getElementById('sido').value;
      populateDong(sido, this.value, 'dong');
    });

    document.getElementById('btn-add-interest').addEventListener('click', function() {
      const sidoSel = document.getElementById('sido');
      const gugunSel = document.getElementById('gugun');
      const dongSel = document.getElementById('dong');
      if (!sidoSel.value || !gugunSel.value || !dongSel.value) {
        alert('시/도, 시/군/구, 읍/면/동을 모두 선택해주세요.');
        return;
      }
      const sido = sidoSel.options[sidoSel.selectedIndex].text;
      const gugun = gugunSel.options[gugunSel.selectedIndex].text;
      const dong = dongSel.options[dongSel.selectedIndex].text;
      const interests = getInterests();
      const duplicate = interests.some(function(item) {
        return item.sido === sido && item.gugun === gugun && item.dong === dong;
      });
      if (duplicate) {
        alert('이미 등록된 관심지역입니다.');
        return;
      }
      interests.push({ sido: sido, gugun: gugun, dong: dong });
      saveInterests(interests);
      loadInterestList();
      selectedInterestIndex = -1;
    });

    document.getElementById('btn-delete-interest').addEventListener('click', function() {
      if (selectedInterestIndex < 0) {
        alert('삭제할 관심지역을 선택해주세요.');
        return;
      }
      const interests = getInterests();
      interests.splice(selectedInterestIndex, 1);
      saveInterests(interests);
      selectedInterestIndex = -1;
      loadInterestList();
    });
  });
</script>
</body>
