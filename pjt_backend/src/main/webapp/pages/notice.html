<!-- 등록 Modal -->
<div class="modal fade" id="noticeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="noticeModalLabel">공지사항 등록</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label for="notice-title-input" class="form-label">제목</label>
          <input type="text" class="form-control" id="notice-title-input" placeholder="제목을 입력하세요">
        </div>
        <div class="mb-3">
          <label for="notice-content-input" class="form-label">내용</label>
          <textarea class="form-control" id="notice-content-input" rows="5" placeholder="내용을 입력하세요"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button type="button" class="btn btn-warning" id="btn-notice-submit">등록</button>
      </div>
    </div>
  </div>
</div>

<!-- 상세 Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="detail-title"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small mb-2" id="detail-meta"></p>
        <div id="detail-content" style="white-space:pre-wrap;"></div>
      </div>
      <div class="modal-footer" id="detail-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
        <button type="button" class="btn btn-primary" id="btn-edit-notice" style="display:none;">수정</button>
        <button type="button" class="btn btn-danger" id="btn-delete-notice" style="display:none;">삭제</button>
      </div>
    </div>
  </div>
</div>

<!-- 수정 Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">공지사항 수정</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label for="edit-title-input" class="form-label">제목</label>
          <input type="text" class="form-control" id="edit-title-input">
        </div>
        <div class="mb-3">
          <label for="edit-content-input" class="form-label">내용</label>
          <textarea class="form-control" id="edit-content-input" rows="5"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button type="button" class="btn btn-primary" id="btn-edit-submit">저장</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
  let currentNoticeId = null;
  let currentKeyword = '';

  function getToday() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function loadNotices() {
    const tbody = document.getElementById('notice-list');
    const empty = document.getElementById('notice-empty');
    let notices = getNotices();

    if (currentKeyword) {
      notices = notices.filter(function(n) {
        return n.title.includes(currentKeyword);
      });
    }

    tbody.innerHTML = '';
    if (notices.length === 0) {
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';

    notices.slice().reverse().forEach(function(notice, idx) {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td>' + (notices.length - idx) + '</td>' +
        '<td>' + escapeHtml(notice.title) + '</td>' +
        '<td>' + notice.views + '</td>' +
        '<td><button class="btn btn-warning btn-sm" data-id="' + notice.id + '">조회</button></td>';
      tbody.appendChild(tr);
    });

    tbody.querySelectorAll('[data-id]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        openDetail(parseInt(this.dataset.id));
      });
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function openDetail(id) {
    const notices = getNotices();
    const idx = notices.findIndex(function(n) { return n.id === id; });
    if (idx < 0) return;

    notices[idx].views++;
    saveNotices(notices);
    loadNotices();

    const notice = notices[idx];
    currentNoticeId = id;

    document.getElementById('detail-title').textContent = notice.title;
    document.getElementById('detail-meta').textContent = '등록일: ' + notice.date + ' | 조회수: ' + notice.views;
    document.getElementById('detail-content').textContent = notice.content;

    const isLoggedIn = checkLogin();
    document.getElementById('btn-edit-notice').style.display = isLoggedIn ? '' : 'none';
    document.getElementById('btn-delete-notice').style.display = isLoggedIn ? '' : 'none';

    const detailModal = new bootstrap.Modal(document.getElementById('detailModal'));
    detailModal.show();
  }

  document.addEventListener('DOMContentLoaded', function() {
    loadNotices();

    // 로그인 상태에 따라 글쓰기 버튼 표시
    if (checkLogin()) {
      document.getElementById('btn-write').style.display = '';
    }

    // 검색
    document.getElementById('btn-search').addEventListener('click', function() {
      currentKeyword = document.getElementById('notice-search').value.trim();
      loadNotices();
    });

    document.getElementById('notice-search').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        currentKeyword = this.value.trim();
        loadNotices();
      }
    });

    // 등록
    document.getElementById('btn-notice-submit').addEventListener('click', function() {
      const title = document.getElementById('notice-title-input').value.trim();
      const content = document.getElementById('notice-content-input').value.trim();
      if (!title || !content) {
        alert('제목과 내용을 모두 입력해주세요.');
        return;
      }
      const notices = getNotices();
      notices.push({
        id: Date.now(),
        title: title,
        content: content,
        views: 0,
        date: getToday()
      });
      saveNotices(notices);
      document.getElementById('notice-title-input').value = '';
      document.getElementById('notice-content-input').value = '';
      bootstrap.Modal.getInstance(document.getElementById('noticeModal')).hide();
      loadNotices();
    });

    // 수정 버튼
    document.getElementById('btn-edit-notice').addEventListener('click', function() {
      const notices = getNotices();
      const notice = notices.find(function(n) { return n.id === currentNoticeId; });
      if (!notice) return;

      document.getElementById('edit-title-input').value = notice.title;
      document.getElementById('edit-content-input').value = notice.content;

      bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide();
      const editModal = new bootstrap.Modal(document.getElementById('editModal'));
      editModal.show();
    });

    // 수정 저장
    document.getElementById('btn-edit-submit').addEventListener('click', function() {
      const title = document.getElementById('edit-title-input').value.trim();
      const content = document.getElementById('edit-content-input').value.trim();
      if (!title || !content) {
        alert('제목과 내용을 모두 입력해주세요.');
        return;
      }
      const notices = getNotices();
      const idx = notices.findIndex(function(n) { return n.id === currentNoticeId; });
      if (idx >= 0) {
        notices[idx].title = title;
        notices[idx].content = content;
        saveNotices(notices);
      }
      bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
      loadNotices();
    });

    // 삭제
    document.getElementById('btn-delete-notice').addEventListener('click', function() {
      if (!confirm('정말 삭제하시겠습니까?')) return;
      let notices = getNotices();
      notices = notices.filter(function(n) { return n.id !== currentNoticeId; });
      saveNotices(notices);
      bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide();
      loadNotices();
    });
  });
</script>
</body>
