      <div class="card-body p-4">
        <h3 class="mb-4">아이디 찾기</h3>
        <form id="find-pw-form" novalidate>
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="fpName" placeholder="이름" required>

          <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
            <input type="text" class="form-control" id="fpId" placeholder="아이디" required>
          </div>
          <div class="input-group mb-4">
            <span class="input-group-text"><i class="bi bi-phone"></i></span>

<!-- 임시 비밀번호 Modal -->

    <div class="modal-content">

      </div>

        <p class="mb-2">발급된 임시 비밀번호입니다.</p>
        <div class="alert alert-info fw-bold fs-5" id="tempPwDisplay"></div>
        <p class="text-muted small">로그인 후 비밀번호를 변경해주세요.</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal" onclick="location.href='login.html'">확인</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
function generateTempPw() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let result = '';
  for (let i = 0; i < 8; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return result;
}

document.getElementById('find-pw-form').addEventListener('submit', function(e) {
  e.preventDefault();

  const name = document.getElementById('fpName').value.trim();
  const id = document.getElementById('fpId').value.trim();
  const phone = document.getElementById('fpPhone').value.trim();

  if (!name || !id || !phone) {
    alert('모든 항목을 입력해주세요.');
    return;
  }

  const users = getUsers();
  const idx = users.findIndex(u => u.name === name && u.id === id && u.phone === phone);

  if (idx === -1) {
    alert('일치하는 회원 정보가 없습니다.');
    return;
  }

  const tempPw = generateTempPw();
  users[idx].pw = tempPw;
  saveUsers(users);

  document.getElementById('tempPwDisplay').textContent = tempPw;
  const modal = new bootstrap.Modal(document.getElementById('pwModal'));
  modal.show();
});
</script>
