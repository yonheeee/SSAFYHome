<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="../index.html">구해줘 Home</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarContent">
      <div class="d-flex align-items-center w-100" id="nav-logged-out">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="notice.html">공지사항</a></li>
          <li class="nav-item"><a class="nav-link" href="../index.html#news-section">오늘의 뉴스</a></li>
        </ul>
        <div class="d-flex gap-2">
          <a href="signup.html" class="btn btn-outline-light btn-sm">Sign Up</a>
          <a href="login.html" class="btn btn-outline-light btn-sm">Login</a>
        </div>
      </div>
      <div class="d-flex align-items-center w-100" id="nav-logged-in" style="display:none">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="notice.html">공지사항</a></li>
          <li class="nav-item"><a class="nav-link" href="../index.html#news-section">오늘의 뉴스</a></li>
          <li class="nav-item"><a class="nav-link" href="#">자유글</a></li>
          <li class="nav-item"><a class="nav-link" href="environment.html">주변탐방</a></li>
          <li class="nav-item"><a class="nav-link" href="interest.html">관심지역 설정</a></li>
          <li class="nav-item"><a class="nav-link" href="explore.html">관심지역 둘러보기</a></li>
        </ul>
        <div class="d-flex gap-2 align-items-center">
          <span class="text-white small" id="nav-user-name"></span>
          <a href="member.html" class="btn btn-outline-light btn-sm">회원정보</a>
          <button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button>
        </div>
      </div>
    </div>

</nav>

<main class="flex-grow-1">
  <section class="hero-section d-flex align-items-center" style="min-height:calc(100vh - 56px - 120px); background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6 text-white mb-4 mb-md-0">
          <h1 class="display-5 fw-bold">구해줘 Home</h1>
          <p class="lead">공공데이터로 찾는 나만의 집</p>
        </div>
        <div class="col-md-6">
          <div class="card shadow-lg mx-auto" style="max-width:400px">
            <div class="card-body p-4">
              <h4 class="mb-4 fw-bold">로그인</h4>
              <form id="login-form" novalidate>
                <div class="mb-3">
                  <label for="loginId" class="form-label">아이디</label>
                  <input type="text" class="form-control" id="loginId" name="id" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="mb-3">
                  <label for="loginPw" class="form-label">비밀번호</label>
                  <input type="password" class="form-control" id="loginPw" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <div class="d-grid mb-3">
                  <button type="submit" class="btn btn-primary">로그인</button>
                </div>
                <div class="d-flex justify-content-between">
				  <a href="signup.html" class="text-decoration-none small">회원가입</a>
				  <a href="find-pw.html" class="text-decoration-none small">비밀번호 찾기</a>
				</div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<footer class="bg-dark text-white py-4 mt-auto">
  <div class="container">
    <h5>Find Us</h5>
    <p class="mb-1"><i class="bi bi-geo-alt"></i> (06234) 서울시 강남구 테헤란로 멀티스퀘어</p>
    <p class="mb-1"><i class="bi bi-telephone"></i> 1544-9001</p>
    <p class="mb-0"><i class="bi bi-envelope"></i> admin@ssafy.com</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const id = document.getElementById('loginId').value.trim();
  const password = document.getElementById('loginPw').value.trim();

  if (!id || !password) {
    alert('아이디와 비밀번호를 입력해주세요.');
    return;
  }

  try {
    const response = await fetch('../auth?action=login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8',
        'X-Requested-With': 'XMLHttpRequest'
      },
      body: new URLSearchParams({ id, password })
    });

    const json = await response.json();

    if (json.result === 'success') {
      location.href = '../index.html';
    } else {
      alert(json.message || '아이디 또는 비밀번호가 일치하지 않습니다.');
    }
  } catch (error) {
    alert('로그인 요청 중 오류가 발생했습니다.');
  }
});
</script>
</body>
</html>
