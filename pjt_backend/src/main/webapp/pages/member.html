<script>
const MEMBER_API_BASE = '..';

async function requestJson(url, options = {}) {
  const response = await fetch(url, {
    ...options,
    headers: {
      'X-Requested-With': 'XMLHttpRequest',
      ...(options.headers || {})
    },
    credentials: 'same-origin'
  });

  const json = await response.json().catch(() => ({}));

  if (!response.ok) {
    throw new Error(json.message || '요청 처리 중 오류가 발생했습니다.');
  }

  return json;
}

document.addEventListener('DOMContentLoaded', async function() {
  try {
    const member = await requestJson(`${MEMBER_API_BASE}/member?action=info`);

    if (member.result === 'fail') {
      alert(member.message || '로그인이 필요합니다.');
      location.href = 'login.html';
      return;
    }

    document.getElementById('mUserId').value = member.id || '';
    document.getElementById('mUserPw').value = member.password || '';
    document.getElementById('mUserName').value = member.name || '';
    document.getElementById('mUserAddr').value = member.address || '';
    document.getElementById('mUserPhone').value = member.phone || '';

  } catch (error) {
    alert(error.message || '회원 정보를 불러오지 못했습니다.');
    location.href = 'login.html';
  }
});

function enableEdit() {
  document.getElementById('mUserPw').removeAttribute('readonly');
  document.getElementById('mUserName').removeAttribute('readonly');
  document.getElementById('mUserAddr').removeAttribute('readonly');
  document.getElementById('mUserPhone').removeAttribute('readonly');

  const btnEdit = document.getElementById('btn-edit');
  btnEdit.textContent = '저장';
  btnEdit.onclick = saveEdit;
}

async function saveEdit() {
  const password = document.getElementById('mUserPw').value.trim();
  const name = document.getElementById('mUserName').value.trim();
  const address = document.getElementById('mUserAddr').value.trim();
  const phone = document.getElementById('mUserPhone').value.trim();

  if (!password || !name || !phone) {
    alert('필수 항목을 모두 입력해주세요.');
    return;
  }

  const pwRegex = /^(?=.*[a-zA-Z])(?=.*\d).{4,}$/;
  if (!pwRegex.test(password)) {
    alert('비밀번호는 영문과 숫자를 조합하여 4자 이상 입력해주세요.');
    return;
  }

  try {
    const json = await requestJson(`${MEMBER_API_BASE}/member?action=update`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
      },
      body: new URLSearchParams({ password, name, address, phone })
    });

    if (json.result === 'success') {
      alert('회원 정보가 수정되었습니다.');
      setReadonlyMode();
      await updateNavbar();
    } else {
      alert(json.message || '회원 정보 수정에 실패했습니다.');
    }
  } catch (error) {
    alert(error.message || '회원 정보 수정에 실패했습니다.');
  }
}

function setReadonlyMode() {
  document.getElementById('mUserPw').setAttribute('readonly', true);
  document.getElementById('mUserName').setAttribute('readonly', true);
  document.getElementById('mUserAddr').setAttribute('readonly', true);
  document.getElementById('mUserPhone').setAttribute('readonly', true);

  const btnEdit = document.getElementById('btn-edit');
  btnEdit.textContent = '수정';
  btnEdit.onclick = enableEdit;
}

async function withdrawMember() {
  if (!confirm('정말로 탈퇴하시겠습니까?')) return;

  try {
    const json = await requestJson(`${MEMBER_API_BASE}/member?action=delete`, {
      method: 'POST'
    });

    if (json.result === 'success') {
      alert('탈퇴가 완료되었습니다.');
      location.href = '../index.html';
    } else {
      alert(json.message || '회원 탈퇴에 실패했습니다.');
    }
  } catch (error) {
    alert(error.message || '회원 탈퇴에 실패했습니다.');
  }
}
</script>
